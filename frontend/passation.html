<!doctype html><html lang='fr'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Passation équipe • A4P</title><link rel='stylesheet' href='css/styles.css'></head><body><div class='shell'>
<div class='topbar'><div class='brand'><img src='assets/logo-a4p.png'><div><h1>Passation collective CMP</h1><p>1 lien pour 30 joueurs</p></div></div><div class='nav'><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div>
<div class='grid grid-2' style='margin-top:18px'>
  <div class='card'>
    <h3>Identité joueur</h3>
    <form id='playerForm'>
      <input name='firstName' placeholder='Prénom' required>
      <input name='lastName' placeholder='Nom' required>
      <input name='position' placeholder='Poste'>
      <button class='btn' type='submit'>Créer le joueur et simuler la passation</button>
    </form>
  </div>
  <div class='card'>
    <h3>Que fait cette page ?</h3>
    <p class='notice'>En V9 production, cette page lancerait le vrai questionnaire CMP. Ici, elle simule une passation et rattache automatiquement le résultat à l'équipe reçue dans l'URL.</p>
    <div class='code' id='meta'></div>
  </div>
</div>
</div>
<script src='js/config.js'></script><script src='js/app.js'></script>
<script>
const params = new URLSearchParams(location.search);
const teamId = params.get('team') || 'team_u18';
const module = (params.get('module') || 'cmp').toUpperCase();
document.getElementById('meta').textContent = `team=${teamId}\nmodule=${module}`;
document.getElementById('playerForm').addEventListener('submit', e=>{
 e.preventDefault();
 const f = new FormData(e.target);
 const db = ensureDemoData();
 const pid = uid('pl');
 db.players.push({id:pid, teamId, firstName:f.get('firstName'), lastName:f.get('lastName'), position:f.get('position') || ''});
 const result = {
   id: uid('t'), playerId: pid, teamId, module: module,
   date: today(), score_global: 62,
   dimensions:{confiance:58, regulation:50, engagement:70, stabilite:70},
   profile:'CMP-2'
 };
 db.tests.push(result);
 setStore('a4p_v9_db', db);
 localStorage.setItem('a4p_hub_results', JSON.stringify({CMP:{
   test:'CMP', profil_code:'CMP-2', profil_nom:'Mobilisation forte mais régulation fluctuante',
   score_global:result.score_global, dimensions:result.dimensions, summary:'Passation enregistrée depuis la plateforme V9.', timestamp:new Date().toISOString()
 }}));
 alert('Passation simulée enregistrée. Retour au dashboard équipe.');
 location.href = 'dashboard.html?team=' + encodeURIComponent(teamId);
});
</script></body></html>
