<!doctype html><html lang='fr'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Analyse IA • A4P</title><link rel='stylesheet' href='css/styles.css'></head><body><div class='shell'>
<div class='topbar'><div class='brand'><img src='assets/logo-a4p.png'><div><h1>Analyse mentale IA</h1><p>Endpoint backend prêt à brancher</p></div></div><div class='nav'><a class='btn secondary' href='dashboard.html'>Retour dashboard</a></div></div>

  <button class='btn' id='run'>Générer une analyse démo</button>
  <div id='out' class='code' style='margin-top:14px'></div>
</div>
</div>
<script src='js/config.js'></script><script src='js/app.js'></script>
<script>
document.getElementById('run').addEventListener('click', async ()=>{
 const s=teamSummary('team_u18');
 document.getElementById('out').textContent = `Analyse démo\n\nScore moyen: ${s.score}/100\nConfiance: ${s.dimensions.confiance}\nRégulation: ${s.dimensions.regulation}\nEngagement: ${s.dimensions.engagement}\nStabilité: ${s.dimensions.stabilite}\n\nInterprétation: équipe engagée, mais régulation à consolider. Priorité staff: routines émotionnelles, respirations, débriefs ciblés.`;
});
</script></body></html>
