<!doctype html><html lang='fr'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Onboarding Club • A4P</title><link rel='stylesheet' href='css/styles.css'></head><body>
<div class='shell'>
<div class='topbar'><div class='brand'><img src='assets/logo-a4p.png'><div><h1>Onboarding club</h1><p>Création automatique du compte club et de la première équipe</p></div></div>
<div class='nav'><a class='btn secondary' href='index.html'>Accueil</a><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div>

<div class='grid grid-2' style='margin-top:18px'>
  <div class='card'>
    <h3>Créer un club</h3>
    <form id='clubForm'>
      <input name='clubName' placeholder='Nom du club' required>
      <input name='sport' placeholder='Sport' value='Rugby' required>
      <input name='coachName' placeholder='Nom du coach' required>
      <input name='coachEmail' type='email' placeholder='Email du coach' required>
      <select name='plan'><option value='starter'>Starter</option><option value='club' selected>Club</option><option value='performance'>Performance</option></select>
      <button class='btn' type='submit'>Créer le compte club</button>
    </form>
    <p class='notice'>Dans la version production, ce flux déclenche Stripe Checkout puis l'activation du workspace club.</p>
  </div>
  <div class='card'>
    <h3>Créer la première équipe</h3>
    <form id='teamForm'>
      <input name='name' placeholder='Nom de l’équipe' value='U18' required>
      <input name='category' placeholder='Catégorie' value='U18' required>
      <input name='playersCount' type='number' placeholder='Nombre de joueurs' value='30' required>
      <button class='btn secondary' type='submit'>Créer l’équipe</button>
    </form>
    <div id='teamResult' class='notice'></div>
  </div>
</div>
</div>
<script src='js/config.js'></script><script src='js/app.js'></script>
<script>
const db = ensureDemoData();
let currentClubId = db.clubs[0]?.id || null;

document.getElementById('clubForm').addEventListener('submit', e=>{
 e.preventDefault();
 const f = new FormData(e.target);
 const db = ensureDemoData();
 const clubId = uid('club');
 db.clubs.push({id:clubId,name:f.get('clubName'),sport:f.get('sport'),plan:f.get('plan'),createdAt:today()});
 db.coaches.push({id:uid('coach'),clubId,name:f.get('coachName'),email:f.get('coachEmail')});
 setStore('a4p_v9_db', db);
 currentClubId = clubId;
 alert('Club créé. Tu peux maintenant créer la première équipe.');
});

document.getElementById('teamForm').addEventListener('submit', e=>{
 e.preventDefault();
 if(!currentClubId){alert('Crée d’abord le club.'); return;}
 const f = new FormData(e.target);
 const id = createTeam({clubId:currentClubId,name:f.get('name'),category:f.get('category'),playersCount:f.get('playersCount')});
 document.getElementById('teamResult').innerHTML = `
 <strong>Équipe créée.</strong><br>
 Lien de passation :<br>
 <div class="code">passation.html?team=${id}&module=cmp</div>
 <div style="margin-top:10px"><a class="btn" href="dashboard.html?team=${id}">Ouvrir le dashboard équipe</a></div>`;
});
</script>
</body></html>
